<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketAI — Investor Pitch</title>
    <meta name="description"
        content="PocketAI Investor Pitch — LLMs in Your Pocket. On-device AI for privacy, speed, and accessibility.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --em: #1AB670;
            --em2: #10B981;
            --white: #fff;
            --fh: 'Montserrat', sans-serif;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--fh);
            background: #000;
            color: var(--white);
        }

        a {
            color: inherit;
            text-decoration: none
        }

        /* FULLSCREEN VIDEO */
        .video-wrapper {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #000;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* OVERLAY NAV */
        .overlay-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            background: linear-gradient(180deg, rgba(0, 0, 0, .6) 0%, rgba(0, 0, 0, .3) 60%, transparent 100%);
            pointer-events: none;
        }

        .overlay-nav>* {
            pointer-events: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            font-family: var(--fh);
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -.04em;
            color: var(--white);
            text-shadow: 0 1px 8px rgba(0, 0, 0, .5);
        }

        .logo em {
            font-style: normal;
            color: var(--em);
        }

        .btn-landing {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 100px;
            font-family: var(--fh);
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(26, 182, 112, .45);
            background: rgba(0, 0, 0, .4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--em);
            cursor: pointer;
            transition: all .3s ease;
            text-shadow: none;
        }

        .btn-landing:hover {
            background: var(--em);
            color: #000;
            border-color: var(--em);
            box-shadow: 0 0 24px rgba(26, 182, 112, .25);
        }

        .btn-landing svg {
            transition: transform .3s ease;
        }

        .btn-landing:hover svg {
            transform: translateX(3px);
        }

        /* PLAY OVERLAY (shown when video is paused initially) */
        .play-overlay {
            position: fixed;
            inset: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, .4);
            cursor: pointer;
            transition: opacity .4s ease;
        }

        .play-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(26, 182, 112, .15);
            border: 2px solid rgba(26, 182, 112, .5);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .3s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .play-btn:hover {
            background: rgba(26, 182, 112, .25);
            border-color: var(--em);
            transform: scale(1.08);
            box-shadow: 0 0 40px rgba(26, 182, 112, .2);
        }

        .play-btn svg {
            color: var(--em);
            margin-left: 4px;
        }

        @media (max-width: 600px) {
            .overlay-nav {
                padding: 14px 18px;
            }

            .logo {
                font-size: 18px;
            }

            .btn-landing {
                padding: 8px 16px;
                font-size: 12px;
            }

            .play-btn {
                width: 64px;
                height: 64px;
            }
        }
    </style>
</head>

<body>
    <!-- FULLSCREEN VIDEO -->
    <div class="video-wrapper">
        <video id="pitchVideo" preload="metadata" playsinline>
            <source src="pitch.mp4" type="video/mp4">
        </video>
    </div>

    <!-- PLAY OVERLAY -->
    <div class="play-overlay" id="playOverlay">
        <div class="play-btn">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <polygon points="6,3 20,12 6,21" />
            </svg>
        </div>
    </div>

    <!-- OVERLAY NAV -->
    <div class="overlay-nav">
        <a href="index.html" class="logo">Pocket<em>AI</em></a>
        <a href="https://pai-technology.com" class="btn-landing">
            Landing Page
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14" />
                <path d="m12 5 7 7-7 7" />
            </svg>
        </a>
    </div>

    <script>
        const video = document.getElementById('pitchVideo');
        const overlay = document.getElementById('playOverlay');

        overlay.addEventListener('click', () => {
            video.play();
            overlay.classList.add('hidden');
        });

        video.addEventListener('play', () => {
            overlay.classList.add('hidden');
        });

        video.addEventListener('pause', () => {
            if (!video.ended) {
                overlay.classList.remove('hidden');
            }
        });

        video.addEventListener('ended', () => {
            overlay.classList.remove('hidden');
        });
    </script>
</body>

</html>
